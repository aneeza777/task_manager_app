name: task_manager
description: Task Manager App with Firebase Firestore and Flutter
publish_to: 'none'

version: 1.0.0+1

environment:
  sdk: ">=3.3.0 <4.0.0"

dependencies:
  flutter:
    sdk: flutter

  cupertino_icons: ^1.0.8

  # 🔥 Firebase
  firebase_core: ^4.7.0
  cloud_firestore: ^6.3.0
  shared_preferences: ^2.5.5
  uuid: ^4.5.3
  firebase_auth: ^6.4.0
  google_fonts: ^8.0.2
  intl: ^0.20.2

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^6.0.0

flutter:
  uses-material-design: true